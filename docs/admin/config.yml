backend:
  name: git-gateway
  branch: main

media_folder: "public/videos"
public_folder: "/videos"

collections:
  - name: "videos"
    label: "Vidéos"
    folder: "src/content/videos"
    create: true
    Format: "mdx"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date de publication", name: "date", widget: "datetime" }
      - { label: "Description", name: "description", widget: "text" }
      - label: "Catégorie"
        name: "category"
        widget: "select"
        options:
          - { label: "Tutoriel", value: "tutorial" }
          - { label: "Présentation", value: "presentation" }
          - { label: "Démo", value: "demo" }
          - { label: "Webinar", value: "webinar" }
          - { label: "Vlog", value: "vlog" }
          - { label: "Interview", value: "interview" }
          - { label: "Autre", value: "other" }
      - label: "Tags"
        name: "tags"
        widget: "list"
        default: []
        field:
          label: "Tag"
          name: "tag"
          widget: "select"
          multiple: true
          options:
            - { label: "Frontend", value: "frontend" }
            - { label: "Backend", value: "backend" }
            - { label: "Astro", value: "astro" }
            - { label: "Vue.js", value: "vuejs" }
            - { label: "TypeScript", value: "typescript" }
            - { label: "JavaScript", value: "javascript" }
            - { label: "CSS", value: "css" }
            - { label: "DevOps", value: "devops" }
            - { label: "Database", value: "database" }
            - { label: "API", value: "api" }
            - { label: "Mobile", value: "mobile" }
            - { label: "Performance", value: "performance" }
            - { label: "Sécurité", value: "security" }
            - { label: "Design", value: "design" }
            - { label: "UX/UI", value: "ux-ui" }
      - label: "Miniature"
        name: "thumbnail"
        widget: "image"
        required: false
        hint: "Image de couverture de la vidéo"
      - label: "Fichier vidéo"
        name: "videoFile"
        widget: "file"
        required: true
        hint: "Format MP4 recommandé"
      - label: "Durée (en secondes)"
        name: "duration"
        widget: "number"
        required: false
        value_type: "int"
        min: 0
      - label: "Vidéo mise en avant"
        name: "featured"
        widget: "boolean"
        default: false